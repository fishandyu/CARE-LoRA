name: care-lora
# Default CUDA 12.1 environment used for the paper experiments on standard
# Ampere/Ada CUDA hosts. The PyTorch wheels are pinned through direct PEP 508
# URLs so `conda env create -f environment.yml` is self-contained.
#
# The flash-attn wheel is matched to the pinned PyTorch/CUDA ABI. If large
# downloads are unreliable, set `PIP_DEFAULT_TIMEOUT=600` before creating the
# environment.
channels:
  - https://mirrors.ustc.edu.cn/anaconda/cloud/conda-forge
  - https://mirrors.ustc.edu.cn/anaconda/pkgs/main
  - https://mirrors.tuna.tsinghua.edu.cn/anaconda/pkgs/main
  - https://mirrors.tuna.tsinghua.edu.cn/anaconda/pkgs/free/
  - https://repo.anaconda.com/pkgs/main
  - https://repo.anaconda.com/pkgs/r
