name: mistralai/Mistral-7B-v0.3
type: CausalLM
use_flash_attention_2: false
epochs: 1
per_device_batch_size: 1
real_batch_size: 32
bf16: true
fp16: false
eval_epochs: 1
early_stopping_patience: 3
max_length: 512
logging_steps: 1
learning_rate: 1.0e-4
weight_decay: 0.0
max_grad_norm: 1.0
warmup_ratio: 0.03
lr_scheduler_type: cosine
optim: adamw_torch
adam_beta1: 0.9
adam_beta2: 0.999
adam_epsilon: 1.0e-8
evaluation_strategy: "no"
save_strategy: "no"
save_total_limit: null
load_best_model_at_end: false
metric_for_best_model: eval_loss
greater_is_better: false
enable_early_stopping: false
run_final_trainer_eval: false
enable_compute_metrics: false
final_gsm8k_eval: false
final_gsm_eval_dataset: gsm-hard
final_gsm8k_max_source_length: 512
final_gsm8k_max_new_tokens: 512
final_humaneval_eval: false
final_humaneval_plus_eval: false
final_humaneval_max_source_length: 1024
final_humaneval_max_new_tokens: 512
final_humaneval_parallel: 1
final_ifeval_eval: false
ifeval_data_path: ""
ifeval_max_source_length: null
ifeval_max_new_tokens: 1280
ifeval_max_examples: null
ifeval_apply_chat_template: true
evalplus_cache_dir: eval_datasets/humaneval
dataloader_num_workers: 4
dataloader_persistent_workers: true
group_by_length: true
gradient_checkpointing: false
track_cuda_peak: true
cuda_allow_tf32: true
