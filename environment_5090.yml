# CARE-LoRA environment for recent NVIDIA GPUs that require CUDA 12.8 wheels.
# It keeps Python 3.10 and the same experiment-facing package stack as
# environment.yml, while moving PyTorch and FlashAttention to CUDA 12.8 builds.
#
# Requirements: x86_64 Linux and an NVIDIA driver that supports CUDA 12.8+.
#
# Example:
#   export PIP_DEFAULT_TIMEOUT=600
#   conda env create -f environment_5090.yml
#
# If the FlashAttention mirror is unavailable, switch to the direct GitHub URL
# in the commented line below.
#
name: care-lora
channels:
  - https://mirrors.ustc.edu.cn/anaconda/cloud/conda-forge
  - https://mirrors.ustc.edu.cn/anaconda/pkgs/main
  - https://mirrors.tuna.tsinghua.edu.cn/anaconda/pkgs/main
  - https://mirrors.tuna.tsinghua.edu.cn/anaconda/pkgs/free/
  - https://repo.anaconda.com/pkgs/main
  - https://repo.anaconda.com/pkgs/r
dependencies:
  # Python 3.10 matches the default environment and the pinned package stack.
  - python=3.10
  - pip>=25
  - setuptools
  - wheel
  - ca-certificates
  # ffmpeg is kept for datasets and evaluation dependencies that import media utilities.
  - ffmpeg
  - pip:
      # --- PyTorch CUDA 12.8 runtime wheels. Keep torch/torchvision/torchaudio versions aligned. ---
      - "torch @ https://download.pytorch.org/whl/cu128/torch-2.7.1%2Bcu128-cp310-cp310-manylinux_2_28_x86_64.whl"
      - "torchvision @ https://download.pytorch.org/whl/cu128/torchvision-0.22.1%2Bcu128-cp310-cp310-manylinux_2_28_x86_64.whl"
      - "torchaudio @ https://download.pytorch.org/whl/cu128/torchaudio-2.7.1%2Bcu128-cp310-cp310-manylinux_2_28_x86_64.whl"
      # FlashAttention wheel matched to torch 2.7.x and the official Linux ABI.
      - "flash-attn @ https://ghproxy.net/https://github.com/Dao-AILab/flash-attention/releases/download/v2.8.3/flash_attn-2.8.3%2Bcu12torch2.7cxx11abiFALSE-cp310-cp310-linux_x86_64.whl"
      # - "flash-attn @ https://github.com/Dao-AILab/flash-attention/releases/download/v2.8.3/flash_attn-2.8.3%2Bcu12torch2.7cxx11abiFALSE-cp310-cp310-linux_x86_64.whl"
      # --- Mostly follows environment.yml, with newer Transformers/Accelerate for CUDA 12.8 hosts. ---
      # transformers 4.57.6 calls newer Accelerator APIs such as
      # unwrap_model(..., keep_torch_compile=False); accelerate 1.1.0 is too old.
